<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NarutoLegends | Hierarquia Shinobi Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600;800&family=Shojumaru&display=swap');

        :root {
            --naruto-orange: #ff6b00;
            --chakra-blue: #00d4ff;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .shojumaru { font-family: 'Shojumaru', cursive; }
        .cinzel { font-family: 'Cinzel', serif; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--naruto-orange); }

        #chakra-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
            opacity: 0.8;
        }

        /* Ninja Nodes */
        .char-node {
            width: 95px; height: 95px; border-radius: 16px;
            background: rgba(25, 25, 25, 0.9); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .char-node:hover {
            transform: scale(1.15) translateY(-8px);
            border-color: var(--naruto-orange);
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.4);
            z-index: 40;
        }

        .char-node img {
            width: 88%; height: 88%; object-fit: cover;
            border-radius: 10px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6));
            transition: 0.3s;
        }

        .tooltip {
            position: absolute; bottom: -35px; left: 50%; transform: translateX(-50%);
            background: #000; color: var(--naruto-orange); padding: 4px 12px;
            border-radius: 6px; font-size: 0.65rem; white-space: nowrap;
            opacity: 0; pointer-events: none; transition: 0.3s;
            font-weight: 800; border: 1px solid var(--naruto-orange);
            z-index: 50; box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }
        .char-node:hover .tooltip { opacity: 1; }

        .tier-section { width: 100%; margin-bottom: 5rem; }
        .tier-title {
            text-align: center; font-size: 1.5rem; color: var(--naruto-orange);
            margin-bottom: 2.5rem; text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 107, 0, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 1rem;
        }
        .tier-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5rem; }

        /* Estilo para Tiers de Clãs e Vilas */
        .sub-tier-title {
            font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.1rem;
            text-transform: uppercase; letter-spacing: 2px;
            border-bottom: 1px dashed rgba(255,255,255,0.15); padding-bottom: 0.5rem;
            margin-bottom: 1.5rem; width: 100%; text-align: left; padding-left: 1rem;
        }
        .clan-title { color: #fbbf24; border-left: 4px solid #fbbf24; } 
        .village-title { color: #38bdf8; border-left: 4px solid #38bdf8; } 

        .drawer-open { transform: translateX(0); }
        .drawer-closed { transform: translateX(100%); }
        .tab-active { color: var(--naruto-orange); border-bottom: 2px solid var(--naruto-orange); }

        .chat-msg-ai { background: rgba(255, 107, 0, 0.1); border-left: 3px solid var(--naruto-orange); padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .chat-msg-user { background: #222; align-self: flex-end; padding: 10px; border-radius: 8px; margin-bottom: 10px; max-width: 85%; }
        
        #loading-screen { background: #050505; z-index: 100; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .badge { font-size: 9px; font-weight: 900; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; }
        .badge-orange { background: rgba(255, 107, 0, 0.2); color: #ff6b00; border: 1px solid rgba(255, 107, 0, 0.3); }
        .badge-blue { background: rgba(0, 212, 255, 0.2); color: #00d4ff; border: 1px solid rgba(0, 212, 255, 0.3); }
    </style>
</head>
<body>

    <div id="chakra-overlay"></div>

    <div id="loading-screen">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-orange-500 mb-6"></div>
        <h2 class="shojumaru text-orange-500 text-xl animate-pulse text-center tracking-widest">
            Acessando Pergaminhos...<br>
            <span class="text-xs text-zinc-500 font-sans tracking-widest mt-2 block">(Cruzando Dados de Múltiplas APIs)</span>
        </h2>
    </div>

    <main class="h-screen w-full overflow-y-auto z-10 relative" id="main-scroll">
        <header class="sticky top-0 bg-stone-950/95 backdrop-blur-xl border-b border-white/10 p-6 z-50 flex flex-col items-center shadow-2xl">
            <h1 class="shojumaru text-5xl text-orange-600 mb-6 tracking-tighter drop-shadow-md">NarutoLegends</h1>
            <div class="w-full max-w-2xl relative">
                <input type="text" id="global-search" placeholder="Procurar Shinobi, Clã ou Vila Oculta..." 
                       class="w-full bg-zinc-900 border border-zinc-700 rounded-full px-8 py-3 text-sm focus:outline-none focus:border-orange-500 transition-all text-white shadow-inner">
            </div>
        </header>

        <div class="max-w-[1400px] mx-auto px-4 py-16">
            <!-- HIERARQUIA DE ELITE -->
            <div id="hierarchy-container"></div>
            
            <!-- ARQUIVO GERAL (CLÃS E VILAS) -->
            <div class="mt-24" id="mortal-section">
                <div class="tier-title cinzel text-3xl mb-12 border-b-2 border-orange-900 pb-4 text-left pl-4">Arquivo Geral Shinobi</div>
                
                <!-- Container Dinâmico -->
                <div id="mortal-section-container" class="flex flex-col gap-12"></div>
            </div>
        </div>
    </main>

    <!-- SIDEBAR / DETALHES -->
    <aside id="char-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[500px] bg-[#0a0a0a] border-l border-white/10 z-[60] drawer-closed transition-transform duration-500 ease-in-out flex flex-col shadow-2xl">
        <button onclick="toggleSidebar(false)" class="absolute top-6 left-6 text-white/50 hover:text-white z-20 bg-black/60 p-2 rounded-full backdrop-blur-md border border-white/10 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>

        <div class="relative h-80 flex flex-col items-center justify-center p-8 bg-zinc-900/30 overflow-hidden shrink-0 border-b border-white/5">
            <div class="absolute inset-0 opacity-20">
                <img id="side-bg-img" src="" class="w-full h-full object-cover blur-3xl">
            </div>
            <img id="side-main-img" src="" class="w-56 h-56 object-contain relative z-10 drop-shadow-[0_20px_40px_rgba(0,0,0,0.9)] rounded-xl">
            <h2 id="side-name" class="shojumaru text-3xl mt-6 text-white relative z-10 text-center">Nome</h2>
            <div id="side-badges" class="mt-3 flex flex-wrap justify-center gap-2 relative z-10 max-w-full"></div>
        </div>

        <div class="flex border-b border-white/5 bg-black/60 shrink-0">
            <button onclick="switchTab('lore')" id="tab-lore-btn" class="flex-1 py-4 text-[11px] font-black tracking-[0.2em] tab-active">PERGAMINHO</button>
            <button onclick="switchTab('chat')" id="tab-chat-btn" class="flex-1 py-4 text-[11px] font-black tracking-[0.2em] text-zinc-500 hover:text-zinc-300 transition-colors">TELEPATIA IA</button>
        </div>

        <div class="flex-1 overflow-y-auto p-8 relative">
            <div id="tab-lore" class="space-y-6">
                <div class="bg-zinc-900/60 p-6 rounded-2xl border-l-4 border-orange-600 shadow-inner">
                    <h4 class="text-[10px] font-bold text-orange-500 uppercase mb-2 tracking-widest">Biografia Registrada</h4>
                    <p id="side-bio" class="text-sm text-zinc-300 leading-relaxed italic"></p>
                </div>
                <div class="grid grid-cols-2 gap-4 text-xs">
                    <div class="bg-zinc-900/40 p-5 rounded-xl border border-white/5">
                        <span class="text-zinc-500 block mb-1 uppercase text-[9px] font-black tracking-wider">Clã de Origem</span>
                        <span id="side-clan" class="font-bold text-zinc-200 text-sm">-</span>
                    </div>
                    <div class="bg-zinc-900/40 p-5 rounded-xl border border-white/5">
                        <span class="text-zinc-500 block mb-1 uppercase text-[9px] font-black tracking-wider">Afiliação (Vila)</span>
                        <span id="side-village" class="font-bold text-zinc-200 text-sm">-</span>
                    </div>
                </div>
                <div>
                    <h4 class="text-[10px] font-bold text-zinc-500 uppercase mb-3 tracking-widest">Jutsus e Habilidades</h4>
                    <div id="side-jutsus" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <div id="tab-chat" class="hidden flex flex-col h-full absolute inset-0 p-8 bg-[#0a0a0a]">
                <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2 text-sm flex flex-col">
                    <div class="chat-msg-ai italic text-zinc-400 font-medium">Sincronizando chakra para iniciar a comunicação...</div>
                </div>
                <form id="chat-form" onsubmit="handleChat(event)" class="flex gap-2 mt-auto shrink-0 pb-4">
                    <input type="text" id="chat-input" placeholder="Comunicação mental..." class="flex-1 bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-3 text-sm focus:outline-none focus:border-orange-500 text-white transition-colors">
                    <button class="bg-orange-600 px-6 rounded-xl font-black text-xs hover:bg-orange-500 text-white tracking-widest shadow-lg transition-all">ENVIAR</button>
                </form>
            </div>
        </div>
    </aside>

    <script>
        const PRIMARY_API = "https://dattebayo-api.onrender.com";
        const FALLBACK_API = "https://narutodb.xyz/api/character/search?name=";
        const apiKey = ""; 

        // ELITE ABSOLUTA: Todos os Kages, Lendas, Akatsuki e Bijuus exigidos.
        const HIERARCHY_MAP = [
            { 
                title: "Divindades Otsutsuki", 
                names: ["Kaguya Ōtsutsuki", "Hagoromo Ōtsutsuki", "Hamura Ōtsutsuki", "Asura Ōtsutsuki", "Indra Ōtsutsuki", "Momoshiki Ōtsutsuki", "Isshiki Ōtsutsuki", "Kinshiki Ōtsutsuki", "Urashiki Ōtsutsuki"] 
            },
            { 
                title: "Kages das 5 Grandes Nações", 
                names: [
                    "Hashirama Senju", "Tobirama Senju", "Hiruzen Sarutobi", "Minato Namikaze", "Tsunade", "Kakashi Hatake", "Naruto Uzumaki", // Hokages
                    "Reto", "Shamon", "Third Kazekage", "Rasa", "Gaara", // Kazekages
                    "A (First Raikage)", "A (Second Raikage)", "A (Third Raikage)", "A (Fourth Raikage)", "Darui", // Raikages
                    "Byakuren", "Gengetsu Hōzuki", "Third Mizukage", "Yagura Karatachi", "Mei Terumī", "Chōjūrō", // Mizukages
                    "Ishikawa", "Mū", "Ōnoki", "Kurotsuchi" // Tsuchikages
                ],
                isKageTier: true 
            },
            { 
                title: "Lendas do Mundo Shinobi", 
                names: ["Madara Uchiha", "Might Guy", "Jiraiya", "Orochimaru", "Sasuke Uchiha", "Sakura Haruno", "Shisui Uchiha", "Sakumo Hatake", "Fugaku Uchiha", "Izuna Uchiha"] 
            },
            { 
                title: "Elite Akatsuki", 
                names: ["Pain", "Konan", "Itachi Uchiha", "Kisame Hoshigaki", "Deidara", "Sasori", "Hidan", "Kakuzu", "Obito Uchiha", "Zetsu"] 
            },
            { 
                title: "Bestas com Cauda (Bijuus)", 
                names: ["Shukaku", "Matatabi", "Isobu", "Son Gokū", "Kokuō", "Saiken", "Chōmei", "Gyūki", "Kurama"] 
            }
        ];

        // Dicionário de Segurança Extrema: Se tudo falhar, usamos estas imagens confiáveis sem tags /revision/ da wikia
        const HARDCODED_IMAGES = {
            "Jiraiya": "https://static.wikia.nocookie.net/naruto/images/2/21/Profile_Jiraiya.PNG",
            "Kurama": "https://static.wikia.nocookie.net/naruto/images/7/7b/Kurama.png",
            "Zetsu": "https://static.wikia.nocookie.net/naruto/images/8/81/Zetsu_Parte_II.png"
        };

        let loadedEliteNames = new Set();
        let selectedChar = null;

        async function init() {
            const container = document.getElementById('hierarchy-container');
            
            // 1. Renderiza a Elite com Dupla Validação (Dattebayo + NarutoDB)
            for (const tier of HIERARCHY_MAP) {
                const section = document.createElement('div');
                section.className = 'tier-section';
                section.innerHTML = `<div class="tier-title cinzel">${tier.title}</div><div class="tier-row" id="row-${tier.title.replace(/\s/g, '').replace(/[^\w-]/g, '')}"></div>`;
                container.appendChild(section);
                const row = document.getElementById(`row-${tier.title.replace(/\s/g, '').replace(/[^\w-]/g, '')}`);
                
                const fetchPromises = tier.names.map(name => fetchCharacterData(name));
                const responses = await Promise.all(fetchPromises);
                
                responses.forEach((char, index) => {
                    if (char) {
                        loadedEliteNames.add(char.name.toLowerCase());
                        // Se for uma Bijuu ou tiver erro de nome na API, força o nome correto do nosso mapa
                        char.customDisplayName = tier.names[index]; 
                        renderCard(char, row, tier.isKageTier);
                    }
                });
            }

            // 2. Renderiza o Arquivo Geral Organizado (Clãs -> Vilas)
            await loadAndSortGeneralArchive();

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('global-search').addEventListener('input', (e) => handleSearch(e.target.value));
        }

        // MOTOR DE BUSCA DUPLO (DATTEBAYO -> NARUTODB)
        async function fetchCharacterData(name) {
            let charData = null;
            
            // Tenta Dattebayo Primeiro
            try {
                const res = await fetch(`${PRIMARY_API}/characters?name=${encodeURIComponent(name)}`);
                const data = await res.json();
                if (data.characters && data.characters.length > 0) {
                    // Match estrito para evitar "Unkai Kurama" em vez de "Kurama"
                    charData = data.characters.find(c => c.name.toLowerCase() === name.toLowerCase()) || data.characters[0];
                }
            } catch (e) {}

            // Se falhou ou a imagem estiver vazia, apela para a NarutoDB
            if (!charData || !charData.images || charData.images.length === 0) {
                try {
                    const resDB = await fetch(`${FALLBACK_API}${encodeURIComponent(name)}`);
                    const dataDB = await resDB.json();
                    if (dataDB && dataDB.id) {
                        if (!charData) {
                            charData = { ...dataDB, personal: dataDB.personal || {} };
                        }
                        if (dataDB.images && dataDB.images.length > 0) {
                            charData.images = dataDB.images;
                        }
                    }
                } catch (e) {}
            }

            // Fallback Mínimo se ambas APIs falharem miseravelmente
            if (!charData) {
                charData = { name: name, images: [], personal: { status: "Desconhecido" }, jutsu: [] };
            }
            return charData;
        }

        async function loadAndSortGeneralArchive() {
            try {
                // Puxa o grosso dos personagens
                const res = await fetch(`${PRIMARY_API}/characters?limit=1500`);
                const data = await res.json();
                
                const clans = {};
                const villages = {};

                data.characters.forEach(char => {
                    if (loadedEliteNames.has(char.name.toLowerCase())) return;

                    // PRIORIDADE 1: CLÃS
                    if (char.personal && char.personal.clan) {
                        let clanName = Array.isArray(char.personal.clan) ? char.personal.clan[0] : char.personal.clan;
                        if (!clans[clanName]) clans[clanName] = [];
                        clans[clanName].push(char);
                    } 
                    // PRIORIDADE 2: VILAS (AFILIAÇÕES)
                    else if (char.personal && char.personal.affiliation) {
                        let affName = Array.isArray(char.personal.affiliation) ? char.personal.affiliation[0] : char.personal.affiliation;
                        if (affName.length > 30) affName = affName.substring(0, 30) + '...'; 
                        if (!villages[affName]) villages[affName] = [];
                        villages[affName].push(char);
                    }
                });

                const container = document.getElementById('mortal-section-container');

                const renderGroup = (title, chars, typeClass) => {
                    if (chars.length === 0) return;
                    const wrapper = document.createElement('div');
                    wrapper.className = 'w-full mb-10 group-container';
                    wrapper.dataset.title = title.toLowerCase();

                    const titleEl = document.createElement('div');
                    titleEl.className = `sub-tier-title ${typeClass}`;
                    titleEl.innerHTML = `${title} <span class="text-xs text-zinc-500 ml-2 font-normal">(${chars.length})</span>`;
                    
                    const rowEl = document.createElement('div');
                    rowEl.className = 'tier-row justify-start pl-6'; 

                    chars.forEach(c => renderCard(c, rowEl, false));

                    wrapper.appendChild(titleEl);
                    wrapper.appendChild(rowEl);
                    container.appendChild(wrapper);
                };

                // Ordena Clãs e Renderiza
                Object.keys(clans).sort().forEach(clan => {
                    renderGroup(`Clã ${clan}`, clans[clan], 'clan-title');
                });

                // Ordena Vilas e Renderiza
                Object.keys(villages).sort().forEach(village => {
                    renderGroup(`Vila / Organização: ${village}`, villages[village], 'village-title');
                });

            } catch (err) { console.error("Falha ao puxar arquivo geral", err); }
        }

        // LIMPEZA DE URL DA WIKIA: Evita quebra de imagens
        function cleanImageUrl(url) {
            if (!url) return null;
            if (url.includes('wikia.nocookie.net') && url.includes('/revision/')) {
                return url.split('/revision/')[0];
            }
            return url;
        }

        function getBestImage(char, isKageTier) {
            let img = HARDCODED_IMAGES[char.name] || HARDCODED_IMAGES[char.customDisplayName];

            if (!img && char.images && char.images.length > 0) {
                // Se for Kage ou Elenco Principal, tenta puxar a última foto (que normalmente é a fase adulta/shippuden)
                if (isKageTier || char.name.includes("Naruto") || char.name.includes("Sasuke") || char.name.includes("Gaara")) {
                    img = char.images[char.images.length - 1];
                } else {
                    img = char.images[0];
                }
            }
            return cleanImageUrl(img);
        }

        function renderCard(char, container, isKageTier = false) {
            const node = document.createElement('div');
            node.className = 'char-node';
            node.onclick = () => openCharDetails(char, isKageTier);
            
            const displayName = char.customDisplayName || char.name;
            const finalImg = getBestImage(char, isKageTier);
            
            // O fallback com avatar gerado só aciona se a imagem limpar estiver corrompida na origem (onerror)
            const fallbackAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=18181b&color=ff6b00&size=200&bold=true`;
            
            node.innerHTML = `
                <img src="${finalImg || fallbackAvatar}" alt="${displayName}" onerror="this.onerror=null; this.src='${fallbackAvatar}';">
                <div class="tooltip">${displayName}</div>
            `;
            container.appendChild(node);
        }

        function openCharDetails(char, isKageTier = false) {
            selectedChar = char;
            toggleSidebar(true);
            
            const displayName = char.customDisplayName || char.name;
            const finalImg = getBestImage(char, isKageTier);
            const fallbackAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=18181b&color=ff6b00&size=400&bold=true`;

            const mainImgEl = document.getElementById('side-main-img');
            mainImgEl.src = finalImg || fallbackAvatar;
            mainImgEl.onerror = function() { this.onerror=null; this.src=fallbackAvatar; };
            
            document.getElementById('side-bg-img').src = finalImg || fallbackAvatar;
            document.getElementById('side-name').innerText = displayName;
            
            const badges = document.getElementById('side-badges');
            badges.innerHTML = `<span class="badge badge-orange">${char.personal?.status || 'Histórico'}</span>`;
            
            const clanData = char.personal?.clan;
            const clanStr = Array.isArray(clanData) ? clanData[0] : clanData;
            if (clanStr) badges.innerHTML += `<span class="badge badge-blue">Clã ${clanStr}</span>`;

            const titles = char.personal?.titles;
            let rank = Array.isArray(titles) ? titles[0] : titles;
            if(!rank && char.personal?.status) rank = char.personal.status;
            
            const affiliation = char.personal?.affiliation;
            const affStr = Array.isArray(affiliation) ? affiliation.join(', ') : (typeof affiliation === 'string' ? affiliation : "Independente");
            
            const debut = char.debut?.anime || char.debut?.manga || "Desconhecido";
            document.getElementById('side-bio').innerText = `Ninja de classificação [${rank || 'Especial'}]. Sua lenda iniciou-se em ${debut}. Todos os dados foram verificados no pergaminho principal da folha.`;
            
            document.getElementById('side-clan').innerText = clanStr || "Sem Clã Declarado";
            document.getElementById('side-village').innerText = affStr;

            const jutsusCont = document.getElementById('side-jutsus');
            jutsusCont.innerHTML = (char.jutsu || []).slice(0, 15).map(j => 
                `<span class="bg-zinc-800/80 text-zinc-300 text-[10px] px-3 py-1.5 rounded-lg border border-white/10 uppercase font-bold shadow-sm">${j}</span>`
            ).join('');
            
            if (!char.jutsu || char.jutsu.length === 0) {
                jutsusCont.innerHTML = "<p class='text-zinc-500 text-xs italic font-semibold'>Pergaminho de jutsus selado ou inexistente.</p>";
            }
            
            document.getElementById('chat-box').innerHTML = `<div class="chat-msg-ai italic text-zinc-400 font-medium">Link mental com ${displayName} estabelecido...</div>`;
            switchTab('lore');
        }

        function toggleSidebar(open) {
            const side = document.getElementById('char-sidebar');
            side.classList.toggle('drawer-open', open);
            side.classList.toggle('drawer-closed', !open);
        }

        function switchTab(tab) {
            document.getElementById('tab-lore').classList.toggle('hidden', tab !== 'lore');
            document.getElementById('tab-chat').classList.toggle('hidden', tab !== 'chat');
            document.getElementById('tab-lore-btn').classList.toggle('tab-active', tab === 'lore');
            document.getElementById('tab-chat-btn').classList.toggle('tab-active', tab === 'chat');
            document.getElementById('tab-lore-btn').classList.toggle('text-zinc-500', tab !== 'lore');
            document.getElementById('tab-chat-btn').classList.toggle('text-zinc-500', tab !== 'chat');
        }

        function handleSearch(q) {
            const query = q.toLowerCase();
            
            document.querySelectorAll('.char-node').forEach(node => {
                const name = node.querySelector('.tooltip').innerText.toLowerCase();
                node.style.display = name.includes(query) ? 'flex' : 'none';
            });

            document.querySelectorAll('.tier-section:not(#mortal-section)').forEach(section => {
                const hasVisible = Array.from(section.querySelectorAll('.char-node')).some(n => n.style.display !== 'none');
                section.style.display = hasVisible ? 'block' : 'none';
            });

            document.querySelectorAll('.group-container').forEach(group => {
                const groupTitle = group.dataset.title || "";
                if (groupTitle.includes(query)) {
                    group.style.display = 'block';
                    group.querySelectorAll('.char-node').forEach(n => n.style.display = 'flex');
                } else {
                    const hasVisible = Array.from(group.querySelectorAll('.char-node')).some(n => n.style.display !== 'none');
                    group.style.display = hasVisible ? 'block' : 'none';
                }
            });
        }

        async function handleChat(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !selectedChar) return;
            const box = document.getElementById('chat-box');
            box.innerHTML += `<div class="chat-msg-user text-xs">${text}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;
            
            const nameToUse = selectedChar.customDisplayName || selectedChar.name;
            const systemPrompt = `Assuma a identidade de ${nameToUse} de Naruto. Responda rigorosamente com a personalidade dele. Máximo de 2 frases. Português do Brasil.`;
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }], systemInstruction: { parts: [{ text: systemPrompt }] } })
                });
                const data = await res.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Falha na conexão de chakra...";
                box.innerHTML += `<div class="chat-msg-ai text-xs font-bold text-orange-400">${nameToUse}: <span class="font-normal text-zinc-300">${reply}</span></div>`;
                box.scrollTop = box.scrollHeight;
            } catch (err) { box.innerHTML += `<div class="text-[10px] text-red-500 italic font-bold">A conexão mental foi cortada.</div>`; }
        }

        window.onload = init;
    </script>
</body>
</html>
